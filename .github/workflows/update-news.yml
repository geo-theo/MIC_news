name: Refresh public intelligence

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-public-intelligence
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect public news and award records
        run: python scripts/fetch_news.py
      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No dataset change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "data: refresh public intelligence snapshot"
          git push
